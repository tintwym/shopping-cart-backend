services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shoppingcart
      POSTGRES_USER: shoppingcart
      POSTGRES_PASSWORD: shoppingcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoppingcart -d shoppingcart"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: local-docker-jwt-secret-key-min-32-chars
      STRIPE_API_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: ""
      APP_FRONTEND_BASE_URL: http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
