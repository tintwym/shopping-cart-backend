# Tests use Testcontainers PostgreSQL (see ShoppingCartSpringApplicationTests).
# Empty DATABASE_URL disables Neon DatabaseConfig so Testcontainers can supply the datasource.
DATABASE_URL=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

jwt.secret=test-secret-key-for-jwt-unit-tests-only-32b
jwt.expiration=3600000

stripe.api.key=sk_test_placeholder_for_context_load
stripe.webhook.secret=

app.frontend.base-url=http://localhost:8081
app.checkout.success-url=
app.checkout.cancel-url=
