spring.application.name=shopping-cart-spring

# Server (Render sets PORT)
server.port=${PORT:8080}

# Database — Neon PostgreSQL
# Primary: set DATABASE_URL in .env (postgresql://user:pass@host/db?sslmode=require)
# DatabaseConfig creates the DataSource when DATABASE_URL is non-empty.
# Fallback JDBC settings apply only when DATABASE_URL is unset:
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shoppingcart}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shoppingcart}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shoppingcart}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Actuator (Render health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

# JWT — set JWT_SECRET in .env (min 32 characters)
jwt.secret=${JWT_SECRET:local-dev-secret-key-for-jwt-testing-32b}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Stripe — set STRIPE_API_KEY and STRIPE_WEBHOOK_SECRET in .env
stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder_for_local_dev}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Flutter client — set APP_FRONTEND_BASE_URL in .env (Stripe redirect fallback for web)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8081}

# Optional: Flutter mobile deep links for Stripe return URLs (leave unset for web)
app.checkout.success-url=${APP_CHECKOUT_SUCCESS_URL:}
app.checkout.cancel-url=${APP_CHECKOUT_CANCEL_URL:}
