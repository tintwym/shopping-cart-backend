spring.datasource.url=jdbc:postgresql://postgres:5432/shoppingcart
spring.datasource.username=shoppingcart
spring.datasource.password=shoppingcart
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:local-docker-jwt-secret-key-min-32-chars}
jwt.expiration=3600000

stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8081}
